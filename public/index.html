<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Founder Signal — Jose Gutiérrez</title>
  <meta name="description" content="Estratégias para empreendedores e startups: artigos, diagnóstico do estágio da sua startup e a experiência de quem já construiu, vendeu e investiu." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <header class="topbar">
    <div class="logo" id="logo-home" title="Home">The Founder <span>Signal</span></div>
    <nav class="mainnav" aria-label="Main">
      <button data-nav="home" class="active" data-i18n="navHome"></button>
      <button data-nav="quiz-intro" data-i18n="navQuiz"></button>
      <button data-nav="articles" data-i18n="navArticles"></button>
      <button data-nav="about" data-i18n="navAbout"></button>
    </nav>
    <nav class="lang-switch" aria-label="Language">
      <button data-lang="en">EN</button>
      <button data-lang="es">ES</button>
      <button data-lang="pt" class="active">PT</button>
    </nav>
  </header>

  <!-- ===== HOME ===== -->
  <section id="home" class="screen active">
    <div class="hero hero-person">
      <img class="avatar" src="img/jose.jpg" style="object-position: 50% 25%;" alt="Jose Gutiérrez" />
      <p class="badge" data-i18n="badge"></p>
      <h1 data-i18n="heroTitle"></h1>
      <p class="subtitle" data-i18n="heroSubtitle"></p>
      <div class="hero-actions">
        <button class="btn-primary" data-nav="quiz-intro" data-i18n="ctaQuiz"></button>
        <button class="btn-secondary" data-nav="articles" data-i18n="ctaArticles"></button>
      </div>
    </div>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        </div>
        <h3 data-i18n="feat1Title"></h3>
        <p data-i18n="feat1Text"></p>
      </div>
      <div class="feature">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></svg>
        </div>
        <h3 data-i18n="feat2Title"></h3>
        <p data-i18n="feat2Text"></p>
      </div>
      <div class="feature">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        </div>
        <h3 data-i18n="feat3Title"></h3>
        <p data-i18n="feat3Text"></p>
      </div>
    </div>

    <div class="pubs">
      <h2 data-i18n="latestTitle"></h2>
      <div id="home-articles" class="pub-list"></div>
      <button class="btn-secondary" data-nav="articles" data-i18n="seeAllArticles"></button>
    </div>
  </section>

  <!-- ===== QUIZ INTRO ===== -->
  <section id="quiz-intro" class="screen">
    <div class="hero">
      <p class="badge" data-i18n="quizBadge"></p>
      <h1 data-i18n="quizTitle"></h1>
      <p class="subtitle" data-i18n="quizSubtitle"></p>
      <button id="start-btn" class="btn-primary" data-i18n="startBtn"></button>
      <p class="hint" data-i18n="heroHint"></p>
    </div>
  </section>

  <!-- ===== QUIZ ===== -->
  <section id="quiz" class="screen">
    <div class="quiz-box">
      <div class="progress-track"><div id="progress-bar"></div></div>
      <p id="question-count" class="question-count"></p>
      <h2 id="question-text"></h2>
      <div id="answers" class="answers"></div>
      <button id="back-btn" class="btn-ghost"></button>
    </div>
  </section>

  <!-- ===== RESULT ===== -->
  <section id="result" class="screen">
    <div class="result-box">
      <p class="badge" data-i18n="resultBadge"></p>
      <div class="score-ring">
        <svg viewBox="0 0 120 120">
          <circle class="ring-bg" cx="60" cy="60" r="52"></circle>
          <circle id="ring-fill" class="ring-fill" cx="60" cy="60" r="52"></circle>
        </svg>
        <div class="score-number"><span id="score-value">0</span><small>/100</small></div>
      </div>
      <h2 id="stage-name"></h2>
      <p id="stage-desc" class="stage-desc"></p>

      <h3 data-i18n="focusTitle"></h3>
      <ol id="recommendations" class="recs"></ol>

      <div class="email-card">
        <h3 data-i18n="emailTitle"></h3>
        <p data-i18n="emailText"></p>
        <form id="email-form">
          <input type="email" id="email-input" required data-i18n-placeholder="emailPlaceholder" />
          <button type="submit" class="btn-primary" data-i18n="emailBtn"></button>
        </form>
        <p id="email-done" class="email-done hidden" data-i18n="emailDone"></p>
        <a class="newsletter-link" href="https://www.linkedin.com/newsletters/the-founder-signal-7312236537943879680/" target="_blank" rel="noopener" data-i18n="newsletterLink"></a>
      </div>

      <button id="retry-btn" class="btn-ghost" data-i18n="retryBtn"></button>
    </div>
  </section>

  <!-- ===== ARTIGOS (lista) ===== -->
  <section id="articles" class="screen">
    <div class="page">
      <h1 data-i18n="articlesTitle"></h1>
      <p class="subtitle" data-i18n="articlesSubtitle"></p>
      <div id="article-list" class="article-list"></div>
      <a class="newsletter-link" href="https://www.linkedin.com/newsletters/the-founder-signal-7312236537943879680/" target="_blank" rel="noopener" data-i18n="pubAll"></a>
    </div>
  </section>

  <!-- ===== ARTIGO (leitura) ===== -->
  <section id="article" class="screen">
    <article class="page reader">
      <button class="btn-ghost" data-nav="articles" data-i18n="backToArticles"></button>
      <div id="article-cover" class="article-cover"></div>
      <p id="article-meta" class="article-meta"></p>
      <h1 id="article-title"></h1>
      <div id="article-body" class="article-body"></div>
      <hr />
      <p class="article-footer"><span data-i18n="articleFooter"></span> <a href="https://www.linkedin.com/newsletters/the-founder-signal-7312236537943879680/" target="_blank" rel="noopener">LinkedIn</a> · <a href="https://thefoundersignal.substack.com" target="_blank" rel="noopener">Substack</a></p>
      <button class="btn-secondary" data-nav="articles" data-i18n="backToArticles"></button>
    </article>
  </section>

  <!-- ===== SOBRE ===== -->
  <section id="about" class="screen">
    <div class="page about">
      <div class="about-header">
        <img class="avatar avatar-lg" src="img/jose.jpg" style="object-position: 50% 25%;" alt="Jose Gutiérrez" />
        <div>
          <h1>Jose Gutiérrez</h1>
          <p class="subtitle" data-i18n="aboutTagline"></p>
          <div class="about-links">
            <a href="https://www.linkedin.com/in/gutihjose/" target="_blank" rel="noopener">LinkedIn</a>
            <a href="https://thefoundersignal.substack.com" target="_blank" rel="noopener">Substack</a>
            <a href="https://www.linkedin.com/newsletters/the-founder-signal-7312236537943879680/" target="_blank" rel="noopener" data-i18n="aboutNewsletter"></a>
          </div>
        </div>
      </div>
      <div id="about-body" class="article-body"></div>
    </div>
  </section>

  <footer>
    <p>© 2026 The Founder Signal · Jose Gutiérrez · <a href="https://www.linkedin.com/newsletters/the-founder-signal-7312236537943879680/" target="_blank" rel="noopener">LinkedIn Newsletter</a></p>
  </footer>

  <script src="articles.js"></script>
  <script src="script.js"></script>
</body>
</html>
